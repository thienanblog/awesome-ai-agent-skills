name: Validate Skills

on:
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'
      - 'plugins/**'
      - 'plugin-groups.json'
      - '.claude-plugin/marketplace.json'
      - '.agents/plugins/marketplace.json'
      - 'README.md'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/validate-pr.yml'
      - '.github/workflows/sync-marketplace.yml'

jobs:
  validate:
    name: Validate Skills
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run validation
        run: npm run validate

      - name: Check generated files are synced
        run: |
          npm run sync
          git diff --exit-code -- .claude-plugin/marketplace.json .agents/plugins/marketplace.json plugins README.md

      - name: Comment on PR (on failure)
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Skill validation failed!**\n\nPlease check the workflow logs for details and fix the issues before merging.\n\nCommon issues:\n- Missing `SKILL.md` file in a skill folder\n- Missing `name` or `description` in SKILL.md frontmatter\n- `author` is still present in SKILL.md frontmatter\n- Skill not assigned in `plugin-groups.json`\n- Generated marketplace/plugin files are out of sync (run `npm run sync` locally)\n- Claude plugin missing `skills` array, `strict: false`, or `source: "./"`\n- Codex plugin missing `.codex-plugin/plugin.json` or bundled `skills/`'
            })
